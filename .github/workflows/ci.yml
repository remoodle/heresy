name: CI

on:
  push:
    branches: [trunk]
  pull_request:
    branches: [trunk]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1

      - run: vp install

      - run: vp run check
