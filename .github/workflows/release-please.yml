name: "Release, please"

on:
  push:
    branches: [trunk]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please/config.json
          manifest-file: .release-please/manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
