name: Parse Schedules and Upload to R2

on:
  workflow_dispatch:
    inputs:
      duToken:
        required: true
        description: "DU auth bearer token"
        type: string

jobs:
  parse-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: iconv, json, zlib
          tools: composer

      - name: Install PHP dependencies
        run: |
          cd .github/scripts/schedule-parser
          composer install

      - name: Create output directory
        run: mkdir -p ./output

      - name: Parse schedule files
        run: |
          cd .github/scripts/schedule-parser
          php command.php ${{ inputs.duToken }} ${{ github.workspace }}/external/schedule ${{ github.workspace }}/output

      - name: List generated files
        run: |
          echo "Generated files:"
          ls -la ./output/ || echo "No output files found"

      - name: Setup rclone
        uses: AnimMouse/setup-rclone@v1
        with:
          rclone_config: ${{ secrets.RCLONE_CONFIG }}

      - name: Upload to R2 bucket
        run: |
          echo "Uploading parsed schedule files to R2..."

          rclone sync ./output remoodle:schedule -v
